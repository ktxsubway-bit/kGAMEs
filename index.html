<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국전번역기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader {
            border-top-color: #4f46e5;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 데스크톱에서 높이를 동일하게 유지하기 위한 설정 */
        @media (min-width: 768px) {
            .translator-container {
                height: 500px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                    <i data-lucide="languages" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">국전번역기</h1>
            </div>
            <button onclick="clearAll()" class="flex items-center gap-1 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                초기화
            </button>
        </header>

        <!-- Main Translator Layout -->
        <div class="flex flex-col gap-4">
            <!-- Language Controls Overlay -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 flex items-center justify-between z-20">
                <div class="relative flex-1">
                    <select id="sourceLang" onchange="triggerTranslate()" class="w-full appearance-none bg-transparent px-4 py-3 pr-10 font-semibold text-slate-700 focus:outline-none cursor-pointer">
                        <option value="auto">🔍 언어 자동 감지</option>
                        <option value="ko">🇰🇷 한국어 (Korean)</option>
                        <option value="en">🇺🇸 영어 (English)</option>
                        <option value="ja">🇯🇵 일본어 (Japanese)</option>
                        <option value="zh-CN">🇨🇳 중국어 (간체)</option>
                        <option value="fr">🇫🇷 프랑스어 (French)</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                </div>

                <div class="px-2">
                    <button onclick="swapLanguages()" id="swapBtn" class="p-2.5 rounded-full bg-slate-50 hover:bg-indigo-50 text-indigo-600 transition-all border border-slate-100 shadow-sm">
                        <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="relative flex-1">
                    <select id="targetLang" onchange="triggerTranslate()" class="w-full appearance-none bg-transparent px-4 py-3 pr-10 font-semibold text-slate-700 focus:outline-none cursor-pointer">
                        <option value="ko" selected>🇰🇷 한국어 (Korean)</option>
                        <option value="en">🇺🇸 영어 (English)</option>
                        <option value="ja">🇯🇵 일본어 (Japanese)</option>
                        <option value="zh-CN">🇨🇳 중국어 (간체)</option>
                        <option value="fr">🇫🇷 프랑스어 (French)</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                </div>
            </div>

            <!-- Side-by-Side Content Area -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 translator-container">
                <!-- Input Panel -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-full">
                    <div class="px-6 py-3 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">입력 (Source)</span>
                    </div>
                    <textarea id="inputText" oninput="debounceTranslate()" placeholder="번역할 내용을 입력하세요..." 
                        class="flex-1 p-6 text-xl text-slate-800 resize-none focus:outline-none placeholder:text-slate-300 leading-relaxed"></textarea>
                    <div class="p-4 flex items-center justify-between bg-white border-t border-slate-50">
                        <span id="charCount" class="text-xs text-slate-400 font-medium ml-2">0 / 5000</span>
                        <button onclick="speak('inputText')" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Output Panel -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-full relative">
                    <div class="px-6 py-3 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">번역 결과 (Translation)</span>
                    </div>
                    
                    <!-- Loading Overlay -->
                    <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-[2px] flex items-center justify-center z-10">
                        <div class="flex flex-col items-center gap-3 text-indigo-600">
                            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-12 w-12"></div>
                            <p class="text-sm font-bold animate-pulse">Groq 번역 중...</p>
                        </div>
                    </div>
                    
                    <div id="outputText" class="flex-1 p-6 text-xl text-slate-800 whitespace-pre-wrap leading-relaxed overflow-y-auto">
                        <span class="text-slate-300 italic">번역 결과가 여기에 표시됩니다.</span>
                    </div>

                    <div class="p-4 flex items-center justify-end bg-white border-t border-slate-50 gap-2">
                        <button onclick="speak('outputText')" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all" title="듣기">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </button>
                        <button onclick="copyToClipboard()" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all" title="복사">
                            <i id="copyIcon" data-lucide="copy" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center text-slate-400 text-sm mt-8 pb-4">
            <p class="font-medium">Powered by Groq • Llama-3.3-70b Engine</p>
        </footer>
    </div>

    <script>
        const apiKey = "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"; 
        // 권장되는 최신 모델로 업데이트
        const MODEL_NAME = "llama-3.3-70b-versatile";
        let debounceTimer;

        lucide.createIcons();

        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const loaderEl = document.getElementById('loader');
        const sourceSelect = document.getElementById('sourceLang');
        const targetSelect = document.getElementById('targetLang');
        const charCountEl = document.getElementById('charCount');

        async function handleTranslate(retryCount = 0) {
            const text = inputEl.value.trim();
            if (!text) {
                outputEl.innerHTML = '<span class="text-slate-300 italic">번역 결과가 여기에 표시됩니다.</span>';
                return;
            }

            loaderEl.classList.remove('hidden');

            const sourceLang = sourceSelect.value;
            const targetLang = targetSelect.value;
            const sourceLabel = sourceLang === 'auto' ? 'detect the language' : sourceSelect.options[sourceSelect.selectedIndex].text;
            const targetLabel = targetSelect.options[targetSelect.selectedIndex].text;

            try {
                const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            {
                                role: "system",
                                content: `You are a professional translator. Translate the text accurately to ${targetLabel}. If the source is not specified, ${sourceLabel}. Output ONLY the translated text.`
                            },
                            {
                                role: "user",
                                content: text
                            }
                        ],
                        temperature: 0.1,
                        max_tokens: 2048,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                }

                const data = await response.json();
                const result = data.choices?.[0]?.message?.content;
                
                if (result) {
                    outputEl.innerText = result.trim();
                    outputEl.classList.remove('italic', 'text-slate-300');
                }
            } catch (err) {
                console.error('Translation process error:', err);
                if (retryCount < 2) {
                    const delay = (retryCount + 1) * 2000;
                    setTimeout(() => handleTranslate(retryCount + 1), delay);
                } else {
                    outputEl.innerHTML = `<span class="text-red-500 font-medium">오류: ${err.message}</span>`;
                }
            } finally {
                loaderEl.classList.add('hidden');
            }
        }

        function debounceTranslate() {
            charCountEl.innerText = `${inputEl.value.length} / 5000`;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(handleTranslate, 1000); 
        }

        function triggerTranslate() {
            handleTranslate();
            const isAuto = sourceSelect.value === 'auto';
            const swapBtn = document.getElementById('swapBtn');
            swapBtn.style.opacity = isAuto ? '0.3' : '1';
            swapBtn.disabled = isAuto;
        }

        function swapLanguages() {
            if (sourceSelect.value === 'auto') return;
            const tempVal = sourceSelect.value;
            sourceSelect.value = targetSelect.value;
            targetSelect.value = tempVal;
            
            const currentInput = inputEl.value;
            const currentOutput = (outputEl.innerText === '번역 결과가 여기에 표시됩니다.' || outputEl.innerText.includes('오류')) ? '' : outputEl.innerText;
            
            inputEl.value = currentOutput;
            handleTranslate();
        }

        function clearAll() {
            inputEl.value = '';
            outputEl.innerHTML = '<span class="text-slate-300 italic">번역 결과가 여기에 표시됩니다.</span>';
            charCountEl.innerText = '0 / 5000';
        }

        function copyToClipboard() {
            const text = outputEl.innerText;
            if (!text || text.includes('표시됩니다.')) return;
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const copyIcon = document.getElementById('copyIcon');
            copyIcon.setAttribute('data-lucide', 'check');
            lucide.createIcons();
            setTimeout(() => {
                copyIcon.setAttribute('data-lucide', 'copy');
                lucide.createIcons();
            }, 2000);
        }

        function speak(elementId) {
            const text = elementId === 'inputText' ? inputEl.value : outputEl.innerText;
            if (!text || text.includes('표시됩니다.')) return;
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
