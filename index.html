<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>머지 스네이크 IO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; background-color: #151515; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        .score-board { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); color: white; backdrop-filter: blur(5px); }
        .leaderboard { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); color: white; width: 180px; backdrop-filter: blur(5px); }
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .btn-primary { background: #6366f1; color: white; padding: 14px 40px; border-radius: 12px; font-weight: 800; font-size: 1.2rem; transition: all 0.2s; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="snakeCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-board">
            <div class="text-[10px] opacity-60 uppercase font-bold tracking-widest">Score</div>
            <div id="score-val" class="text-2xl font-black tabular-nums text-indigo-400">0</div>
        </div>

        <div class="leaderboard">
            <div class="text-[10px] opacity-60 uppercase mb-2 font-bold tracking-widest border-b border-white/10 pb-1">Leaderboard</div>
            <div id="leaderboard-list" class="text-xs space-y-1.5 font-semibold">
                <!-- Ranking items injected here -->
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen interactive">
        <h1 class="text-6xl font-black text-white mb-4 italic tracking-tighter">MERGE <span class="text-indigo-500">SNAKE</span></h1>
        <p class="text-gray-400 mb-8 text-center leading-relaxed">마우스나 터치로 이동해 먹이를 먹으세요.<br>다른 뱀의 몸에 머리가 닿으면 패배합니다!</p>
        <button id="start-btn" class="btn-primary">게임 시작</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen interactive hidden">
        <h1 class="text-5xl font-black text-red-500 mb-2">ELIMINATED</h1>
        <p id="final-score-text" class="text-white text-lg mb-8 opacity-70">최종 점수: 0</p>
        <button id="restart-btn" class="btn-primary">다시 도전</button>
    </div>
</div>

<script>
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('score-val');
const leaderboardList = document.getElementById('leaderboard-list');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');

let width, height;
let isRunning = false;
let mouse = { x: 0, y: 0 };
let foods = [];
let snakes = [];
const NPC_COUNT = 10;
const INITIAL_FOOD_COUNT = 100;
const MAP_SIZE = 2500; 

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', resize);
resize();

function randomPos() {
    return { x: Math.random() * MAP_SIZE, y: Math.random() * MAP_SIZE };
}

class Food {
    constructor(x, y, value = 0.5, size = null, color = null) {
        this.x = x || Math.random() * MAP_SIZE;
        this.y = y || Math.random() * MAP_SIZE;
        this.value = value; // 1 value = 1 segment 성장
        this.size = size || Math.random() * 2 + 3;
        this.color = color || `hsl(${Math.random() * 360}, 60%, 60%)`;
        this.isSpecial = !!color; // 사냥 전리품인 경우
    }
    draw(cameraX, cameraY) {
        if (this.x - cameraX < -100 || this.x - cameraX > width + 100 || 
            this.y - cameraY < -100 || this.y - cameraY > height + 100) return;

        ctx.fillStyle = this.color;
        if (this.isSpecial) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
        }
        ctx.beginPath();
        ctx.arc(this.x - cameraX, this.y - cameraY, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Snake {
    constructor(name, isPlayer = false) {
        this.name = name;
        this.isPlayer = isPlayer;
        this.reset();
    }

    reset() {
        const pos = randomPos();
        this.segments = [];
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 2.8;
        this.baseSize = 10;
        this.score = 0; // score는 추가 길이와 동일
        this.color = this.isPlayer ? '#6366f1' : `hsl(${Math.random() * 360}, 50%, 50%)`;
        this.isDead = false;

        // 초기 몸체 생성 (10마디)
        for (let i = 0; i < 10; i++) {
            this.segments.push({ x: pos.x, y: pos.y });
        }
    }

    update() {
        if (this.isDead) return;

        const head = this.segments[0];

        if (this.isPlayer) {
            const targetAngle = Math.atan2(mouse.y - (height / 2), mouse.x - (width / 2));
            let diff = targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.12;
        } else {
            // NPC AI: 자연스럽게 선회
            if (Math.random() < 0.02) this.turnSpeed = (Math.random() - 0.5) * 0.15;
            this.angle += this.turnSpeed || 0;
            
            // 벽 감지 및 회피
            const margin = 150;
            if (head.x < margin || head.x > MAP_SIZE - margin || head.y < margin || head.y > MAP_SIZE - margin) {
                const centerAngle = Math.atan2(MAP_SIZE/2 - head.y, MAP_SIZE/2 - head.x);
                let diff = centerAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * 0.1;
            }
        }

        const vx = Math.cos(this.angle) * this.speed;
        const vy = Math.sin(this.angle) * this.speed;
        const newHead = { x: head.x + vx, y: head.y + vy };

        // 벽 충돌 체크
        if (newHead.x < 0 || newHead.x > MAP_SIZE || newHead.y < 0 || newHead.y > MAP_SIZE) {
            this.die();
            return;
        }

        this.segments.unshift(newHead);
        
        // 성장 조절: 초기 길이 10 + 먹어서 얻은 점수(score)
        const targetLength = 10 + Math.floor(this.score);
        while (this.segments.length > targetLength) {
            this.segments.pop();
        }

        this.checkCollisions();
    }

    checkCollisions() {
        const head = this.segments[0];

        // 먹이 습득
        for (let i = foods.length - 1; i >= 0; i--) {
            const f = foods[i];
            const dist = Math.hypot(head.x - f.x, head.y - f.y);
            if (dist < this.baseSize + 5) {
                this.score += f.value;
                if (f.isSpecial) {
                    foods.splice(i, 1); // 전리품은 사라짐
                } else {
                    f.x = Math.random() * MAP_SIZE; // 일반 먹이는 재배치
                    f.y = Math.random() * MAP_SIZE;
                }
                if (this.isPlayer) scoreVal.innerText = Math.floor(this.score);
            }
        }

        // 다른 스네이크와의 충돌
        snakes.forEach(other => {
            if (other === this || other.isDead) return;
            for (let i = 0; i < other.segments.length; i++) {
                const seg = other.segments[i];
                const dist = Math.hypot(head.x - seg.x, head.y - seg.y);
                // 머리가 상대방의 몸통에 닿았는가?
                if (dist < this.baseSize + 2) {
                    this.die();
                    break;
                }
            }
        });
    }

    die() {
        if (this.isDead) return;
        this.isDead = true;
        
        // 죽은 길이만큼 전리품 생성 (매 2세그먼트마다 2의 가치를 지닌 먹이 생성)
        // 결과적으로 먹은 사람은 죽은 스네이크의 순수 몸길이만큼 성장함
        for (let i = 0; i < this.segments.length; i += 2) {
            const seg = this.segments[i];
            foods.push(new Food(seg.x, seg.y, 2, 6, this.color));
        }

        if (this.isPlayer) {
            isRunning = false;
            document.getElementById('final-score-text').innerText = `최종 점수: ${Math.floor(this.score)}`;
            gameOverScreen.classList.remove('hidden');
        } else {
            setTimeout(() => this.reset(), 3000); // NPC 부활
        }
    }

    draw(cameraX, cameraY) {
        if (this.isDead) return;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.baseSize * 2;
        
        // 몸통
        ctx.beginPath();
        ctx.moveTo(this.segments[0].x - cameraX, this.segments[0].y - cameraY);
        for (let i = 1; i < this.segments.length; i++) {
            ctx.lineTo(this.segments[i].x - cameraX, this.segments[i].y - cameraY);
        }
        ctx.stroke();

        // 눈
        const head = this.segments[0];
        const hx = head.x - cameraX;
        const hy = head.y - cameraY;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(hx + Math.cos(this.angle + 0.5) * 6, hy + Math.sin(this.angle + 0.5) * 6, 3, 0, Math.PI * 2);
        ctx.arc(hx + Math.cos(this.angle - 0.5) * 6, hy + Math.sin(this.angle - 0.5) * 6, 3, 0, Math.PI * 2);
        ctx.fill();

        // 이름
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '10px Inter';
        ctx.textAlign = 'center';
        ctx.fillText(this.name, hx, hy - 15);
    }
}

function updateLeaderboard() {
    const sorted = [...snakes].sort((a, b) => b.score - a.score).slice(0, 5);
    leaderboardList.innerHTML = sorted.map((s, i) => `
        <div class="flex justify-between items-center ${s.isPlayer ? 'text-indigo-400 font-bold' : 'opacity-80'}">
            <span class="truncate pr-2">${i + 1}. ${s.name}</span>
            <span class="tabular-nums">${Math.floor(s.score)}</span>
        </div>
    `).join('');
}

function initGame() {
    foods = [];
    for (let i = 0; i < INITIAL_FOOD_COUNT; i++) foods.push(new Food());

    snakes = [];
    const player = new Snake("You", true);
    snakes.push(player);

    const names = ["Shadow", "Viper", "Cobalt", "Rex", "Neon", "Zane", "Spark", "Mamba", "Draco", "Lunar"];
    for (let i = 0; i < NPC_COUNT; i++) {
        snakes.push(new Snake(names[i]));
    }

    isRunning = true;
    scoreVal.innerText = '0';
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if (!isRunning) return;

    ctx.clearRect(0, 0, width, height);

    const player = snakes.find(s => s.isPlayer);
    const cameraX = player ? player.segments[0].x - width / 2 : 0;
    const cameraY = player ? player.segments[0].y - height / 2 : 0;

    // 그리드 배경
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = -cameraX % 100; x < width; x += 100) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = -cameraY % 100; y < height; y += 100) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }

    // 맵 경계
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.strokeRect(-cameraX, -cameraY, MAP_SIZE, MAP_SIZE);

    // 업데이트 및 렌더링
    foods.forEach(f => f.draw(cameraX, cameraY));
    snakes.forEach(s => {
        s.update();
        s.draw(cameraX, cameraY);
    });

    if (Math.floor(Date.now() / 1000) % 2 === 0) updateLeaderboard();

    requestAnimationFrame(gameLoop);
}

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX; mouse.y = e.clientY;
});
window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
    }
}, { passive: false });

startBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    initGame();
});

restartBtn.addEventListener('click', () => {
    gameOverScreen.classList.add('hidden');
    initGame();
});

// 초기화면 배경색
ctx.fillStyle = '#151515';
ctx.fillRect(0, 0, width, height);
</script>

</body>
</html>
