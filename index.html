<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Snake IO - Mobile Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
        #app { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
/**
 * STREAMING_CHUNK:초기 설정 및 모바일 스타일 정의
 */
const mountMergeSnake = (container) => {
    if (!container) return;

    const style = document.createElement('style');
    style.textContent = `
        .ms-wrapper { position: relative; width: 100%; height: 100%; background: #050505; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; touch-action: none; user-select: none; }
        .ms-canvas { display: block; width: 100%; height: 100%; }
        .ms-ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .ms-interactive { pointer-events: auto; }
        .ms-score { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; background: rgba(15, 15, 15, 0.8); padding: 10px 20px; border-radius: 12px; color: white; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        .ms-leaderboard { position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; background: rgba(15, 15, 15, 0.8); padding: 12px; border-radius: 12px; color: white; width: 140px; font-size: 12px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        .ms-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; transition: opacity 0.3s; text-align: center; padding: 20px; }
        .ms-btn { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; padding: 14px 40px; border-radius: 50px; font-weight: 800; font-size: 18px; cursor: pointer; border: none; margin-top: 20px; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); }
        .ms-hidden { display: none !important; }
        .key-cap { display: inline-block; padding: 2px 6px; background: #334155; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; }
    `;
    document.head.appendChild(style);

    container.innerHTML = `
        <div class="ms-wrapper">
            <canvas class="ms-canvas"></canvas>
            <div class="ms-ui">
                <div class="ms-score">
                    <div style="font-size: 10px; opacity: 0.5; font-weight: bold; letter-spacing: 1px;">LENGTH</div>
                    <div id="ms-score-val" style="font-size: 24px; font-weight: 900; color: #818cf8;">15</div>
                </div>
                <div class="ms-leaderboard">
                    <div id="ms-rank-list"></div>
                </div>
            </div>
            <div id="ms-start-screen" class="ms-screen ms-interactive">
                <h1 style="font-size: 48px; font-weight: 900; letter-spacing: -2px; margin: 0;">SNAKE <span style="color: #6366f1;">IO</span></h1>
                <p style="opacity: 0.6; margin-top: 10px; font-size: 14px;">PC: <span class="key-cap">WASD</span> 조작<br>모바일: 왼쪽 하단 터치 조이스틱</p>
                <button class="ms-btn" id="ms-start-btn">START GAME</button>
            </div>
            <div id="ms-over-screen" class="ms-screen ms-interactive ms-hidden">
                <h1 style="font-size: 40px; font-weight: 900; color: #ef4444;">GAME OVER</h1>
                <p id="ms-final-score" style="font-size: 18px; margin-top: 5px; opacity: 0.8;"></p>
                <button class="ms-btn" id="ms-restart-btn">RETRY</button>
            </div>
        </div>
    `;

    const canvas = container.querySelector('.ms-canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = container.querySelector('#ms-score-val');
    const rankList = container.querySelector('#ms-rank-list');
    const startScreen = container.querySelector('#ms-start-screen');
    const overScreen = container.querySelector('#ms-over-screen');
    
    let width, height;
    let animationId;
    let isRunning = false;
    let camera = { x: 0, y: 0 };
    
    /* 조작 변수 */
    const keys = { w: false, a: false, s: false, d: false };
    let joystick = { active: false, startX: 0, startY: 0, currX: 0, currY: 0, angle: 0 };

    const MAP_SIZE = 2500;
    const NPC_COUNT = 10;
    let snakes = [];
    let foods = [];

    const resize = () => {
        width = container.clientWidth;
        height = container.clientHeight;
        canvas.width = width;
        canvas.height = height;
    };
    window.addEventListener('resize', resize);
    resize();

    class Food {
        constructor(x, y, value = 0.5, size = 3, color = null) {
            this.x = x || Math.random() * MAP_SIZE;
            this.y = y || Math.random() * MAP_SIZE;
            this.value = value;
            this.size = size;
            this.color = color || `hsl(${Math.random() * 360}, 80%, 65%)`;
        }
        draw() {
            const rx = this.x - camera.x;
            const ry = this.y - camera.y;
            if (rx < -50 || rx > width + 50 || ry < -50 || ry > height + 50) return;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(rx, ry, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Snake {
        constructor(name, isPlayer = false) {
            this.name = name;
            this.isPlayer = isPlayer;
            this.init();
        }

        init() {
            this.x = Math.random() * (MAP_SIZE - 600) + 300;
            this.y = Math.random() * (MAP_SIZE - 600) + 300;
            this.angle = Math.random() * Math.PI * 2;
            this.speed = 2.0;
            this.score = 0; 
            this.baseLength = 15;
            this.segments = [];
            this.color = this.isPlayer ? '#6366f1' : `hsl(${Math.random() * 360}, 60%, 50%)`;
            this.isDead = false;

            for (let i = 0; i < this.baseLength; i++) {
                this.segments.push({ x: this.x, y: this.y });
            }
        }

        update() {
            if (this.isDead) return;

            if (this.isPlayer) {
                /* WASD + 조이스틱 통합 조작 */
                let dx = 0; let dy = 0;
                if (keys.w) dy -= 1; if (keys.s) dy += 1; if (keys.a) dx -= 1; if (keys.d) dx += 1;

                if (joystick.active) {
                    this.angle = joystick.angle;
                } else if (dx !== 0 || dy !== 0) {
                    const targetAngle = Math.atan2(dy, dx);
                    let diff = targetAngle - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.15;
                }
            } else {
                /* 자연스러운 NPC AI (빙글빙글 금지) */
                if (Math.random() < 0.02) this.turnSpeed = (Math.random() - 0.5) * 0.08;
                this.angle += this.turnSpeed || 0;

                const margin = 200;
                if (this.x < margin || this.x > MAP_SIZE - margin || this.y < margin || this.y > MAP_SIZE - margin) {
                    const angleToCenter = Math.atan2(MAP_SIZE/2 - this.y, MAP_SIZE/2 - this.x);
                    let diff = angleToCenter - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.05;
                }
            }

            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;

            if (this.x < 0 || this.x > MAP_SIZE || this.y < 0 || this.y > MAP_SIZE) {
                this.die(); return;
            }

            for (let other of snakes) {
                if (other === this || other.isDead) continue;
                for (let i = 0; i < other.segments.length; i += 3) {
                    const seg = other.segments[i];
                    if (Math.hypot(this.x - seg.x, this.y - seg.y) < 14) {
                        this.die(); return;
                    }
                }
            }

            for (let i = foods.length - 1; i >= 0; i--) {
                if (Math.hypot(this.x - foods[i].x, this.y - foods[i].y) < 20) {
                    this.score += foods[i].value;
                    if (foods[i].value < 1) { foods.splice(i, 1); foods.push(new Food()); }
                    else { foods.splice(i, 1); }
                    if (this.isPlayer) scoreVal.innerText = Math.floor(this.baseLength + this.score);
                }
            }

            this.segments.unshift({ x: this.x, y: this.y });
            const targetTotalLength = this.baseLength + Math.floor(this.score / 2);
            while (this.segments.length > targetTotalLength) {
                this.segments.pop();
            }
        }

        die() {
            if (this.isDead) return;
            this.isDead = true;
            for (let i = 0; i < this.segments.length; i += 4) {
                const seg = this.segments[i];
                foods.push(new Food(seg.x, seg.y, 2, 5, this.color));
            }
            if (this.isPlayer) {
                isRunning = false;
                container.querySelector('#ms-final-score').innerText = `Final Length: ${Math.floor(this.baseLength + this.score/2)}`;
                overScreen.classList.remove('ms-hidden');
            } else {
                setTimeout(() => { if (isRunning) { this.init(); this.isDead = false; } }, 3000);
            }
        }

        draw() {
            if (this.isDead) return;
            const rx = this.segments[0].x - camera.x;
            const ry = this.segments[0].y - camera.y;
            if (rx < -200 || rx > width + 200 || ry < -200 || ry > height + 200) return;

            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 18;
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            for (let i = 1; i < this.segments.length; i++) {
                ctx.lineTo(this.segments[i].x - camera.x, this.segments[i].y - camera.y);
            }
            ctx.stroke();

            ctx.fillStyle = 'white';
            const ex = Math.cos(this.angle + 0.45) * 8;
            const ey = Math.sin(this.angle + 0.45) * 8;
            ctx.beginPath();
            ctx.arc(rx + ex, ry + ey, 3, 0, Math.PI * 2);
            ctx.arc(rx + Math.cos(this.angle - 0.45) * 8, ry + Math.sin(this.angle - 0.45) * 8, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    /**
     * STREAMING_CHUNK:게임 루프 및 조이스틱 렌더링
     */
    const gameLoop = () => {
        if (!isRunning) return;

        const player = snakes.find(s => s.isPlayer);
        if (player) {
            camera.x = player.x - width / 2;
            camera.y = player.y - height / 2;
        }

        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

        // 그리드
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 1;
        const gs = 80;
        for (let x = -camera.x % gs; x < width; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
        for (let y = -camera.y % gs; y < height; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }

        // 테두리
        ctx.strokeStyle = '#222'; ctx.lineWidth = 8;
        ctx.strokeRect(-camera.x, -camera.y, MAP_SIZE, MAP_SIZE);

        foods.forEach(f => f.draw());
        snakes.forEach(s => { s.update(); s.draw(); });

        /* 조이스틱 UI 그리기 (터치 중일 때만) */
        if (joystick.active) {
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, 50, 0, Math.PI * 2);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath();
            const knobX = joystick.startX + Math.cos(joystick.angle) * Math.min(joystick.dist, 40);
            const knobY = joystick.startY + Math.sin(joystick.angle) * Math.min(joystick.dist, 40);
            ctx.arc(knobX, knobY, 25, 0, Math.PI * 2);
            ctx.fillStyle = 'white'; ctx.fill();
            ctx.restore();
        }

        if (Math.random() < 0.02) {
            const sorted = [...snakes].filter(s => !s.isDead).sort((a, b) => b.segments.length - a.segments.length).slice(0, 5);
            rankList.innerHTML = sorted.map((s, i) => `
                <div style="display: flex; justify-content: space-between; margin-bottom: 4px; ${s.isPlayer ? 'color: #818cf8; font-weight: bold;' : 'opacity: 0.7;'}">
                    <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px;">${i+1}. ${s.name}</span>
                    <span>${s.segments.length}</span>
                </div>
            `).join('');
        }

        animationId = requestAnimationFrame(gameLoop);
    };

    /**
     * STREAMING_CHUNK:입력 이벤트 핸들링
     */
    const handleKeyDown = (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; };
    const handleKeyUp = (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; };
    
    const handleTouchStart = (e) => {
        const t = e.touches[0];
        joystick.active = true;
        joystick.startX = t.clientX;
        joystick.startY = t.clientY;
        joystick.currX = t.clientX;
        joystick.currY = t.clientY;
    };
    const handleTouchMove = (e) => {
        if (!joystick.active) return;
        const t = e.touches[0];
        joystick.currX = t.clientX;
        joystick.currY = t.clientY;
        const dx = joystick.currX - joystick.startX;
        const dy = joystick.currY - joystick.startY;
        joystick.angle = Math.atan2(dy, dx);
        joystick.dist = Math.hypot(dx, dy);
    };
    const handleTouchEnd = () => { joystick.active = false; };

    const startGame = () => {
        snakes = [new Snake("YOU", true)];
        const names = ["Alpha", "Viper", "Ghost", "Rex", "Neon", "Shadow", "Hunter", "Mamba", "Draco", "Lunar"];
        for (let i = 0; i < NPC_COUNT; i++) snakes.push(new Snake(names[i]));
        foods = [];
        for (let i = 0; i < 150; i++) foods.push(new Food());
        isRunning = true;
        startScreen.classList.add('ms-hidden');
        overScreen.classList.add('ms-hidden');
        gameLoop();
    };

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    canvas.addEventListener('touchstart', handleTouchStart);
    canvas.addEventListener('touchmove', handleTouchMove);
    canvas.addEventListener('touchend', handleTouchEnd);
    
    container.querySelector('#ms-start-btn').addEventListener('click', startGame);
    container.querySelector('#ms-restart-btn').addEventListener('click', startGame);

    return () => {
        isRunning = false; cancelAnimationFrame(animationId);
        window.removeEventListener('resize', resize);
        window.removeEventListener('keydown', handleKeyDown);
        window.removeEventListener('keyup', handleKeyUp);
        style.remove();
    };
};

mountMergeSnake(document.getElementById('app'));
</script>

</body>
</html>
